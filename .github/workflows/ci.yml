name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  tests:
    name: Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --all-groups --all-extras

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint code
        run: uv run ruff check .

      - name: Build documentation
        run: |
          cd docs
          uv run sphinx-build -b html -W source build/html

      - name: Setup Blender
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && matrix.python-version == '3.12'
        uses: ./.github/actions/setup-blender
        with:
          version: '4.2.0'

      - name: Run tests
        run: uv run pytest -q

      - name: Build package
        # Only build the artifact on a single matrix job and only on main push
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && matrix.python-version == '3.12'
        run: |
          uv run python platforms/blender/scripts/build.py
          ls -lh dist/

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v6
        with:
          name: blender-extension
          path: dist/linkforge-*.zip
          retention-days: 7

  check-and-build:
    name: Check & Build
    needs: tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Pass if all tests succeeded
        if: ${{ needs.tests.result == 'success' }}
        run: exit 0
      - name: Fail if tests failed
        if: ${{ needs.tests.result != 'success' }}
        run: exit 1
